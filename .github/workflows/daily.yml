name: 每日新闻推送

on:
  schedule:
    # 北京时间每天早上8:00 (UTC 0:00) — 推送昨日新闻
    - cron: '0 0 * * *'
    # 北京时间每天下午18:00 (UTC 10:00) — 推送今日新闻
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 运行主程序
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          OPEN_ID: ${{ secrets.OPEN_ID }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
        run: python main.py
      
      - name: 提交HTML更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "📰 自动更新 $(date +%Y-%m-%d) 新闻"
          git push
